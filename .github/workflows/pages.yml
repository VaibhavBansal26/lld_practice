name: Deploy Jupyter Book (classic) to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (pin classic jupyter-book in requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight
        run: |
          echo "Repo root:"
          ls -la
          echo "_toc.yml:"
          cat _toc.yml
          echo "_config.yml:"
          cat _config.yml
          echo "All md/ipynb files:"
          find . -maxdepth 4 -type f \( -name "*.md" -o -name "*.ipynb" \) -print

      - name: Build Jupyter Book (classic)
        run: jupyter-book build .

      - name: Verify output exists
        run: |
          ls -la _build || true
          ls -la _build/html || true
          test -d "_build/html" || (echo "ERROR: _build/html not created" && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4