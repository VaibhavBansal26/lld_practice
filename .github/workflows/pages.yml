name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U jupyter-book

      - name: Preflight (confirm files exist)
        run: |
          echo "Root files:"
          ls -la
          echo "intro.md:"
          ls -la intro.md || true
          echo "_toc.yml:"
          cat _toc.yml || true
          echo "All md/ipynb files:"
          find . -maxdepth 4 -type f \( -name "*.md" -o -name "*.ipynb" \) -print

      - name: Build Jupyter Book (print full error if fails)
        run: |
          set -e
          jupyter-book build . 2>&1 | tee jb_build.log

      - name: Verify output
        run: |
          echo "Build folders:"
          find _build -maxdepth 3 -type d -print || true
          test -d "_build/html" || (echo "ERROR: _build/html not created. Build likely failed above." && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4